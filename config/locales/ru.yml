ru:
  pg_reports:
    documentation:
      # === QUERIES ===
      slow_queries:
        title: "Slow Queries"
        what: "Запросы с высоким средним временем выполнения (mean_time)."
        how: "Данные собираются из pg_stat_statements — расширения PostgreSQL, которое отслеживает статистику выполнения всех SQL-запросов. Среднее время рассчитывается как total_time / calls."
        nuances:
          - "Планировщик PostgreSQL может НЕ использовать индексы для небольших таблиц (< 10-50 тыс. строк), если sequential scan быстрее — это нормальное поведение."
          - "Высокое среднее время может быть вызвано: отсутствием индекса, неоптимальным планом, блокировками, нагрузкой на диск."
          - "Для комплексных индексов важен порядок колонок — индекс (a, b) эффективен для WHERE a = ? и WHERE a = ? AND b = ?, но не для WHERE b = ?."
          - "Запросы с LIKE '%pattern%' не могут использовать B-tree индексы — рассмотрите pg_trgm или полнотекстовый поиск."

      heavy_queries:
        title: "Heavy Queries"
        what: "Наиболее часто вызываемые запросы (по количеству вызовов)."
        how: "Подсчитывается поле calls из pg_stat_statements. Высокое число вызовов увеличивает общую нагрузку на базу, даже если каждый отдельный запрос быстрый."
        nuances:
          - "Частые запросы — первые кандидаты на кэширование на уровне приложения (Redis, Memcached)."
          - "N+1 проблема: если видите много похожих запросов с разными ID — это признак N+1, нужен eager loading."
          - "Рассмотрите batch-операции вместо множества одиночных запросов."
          - "Prepared statements могут снизить накладные расходы на парсинг для частых запросов."

      expensive_queries:
        title: "Expensive Queries"
        what: "Запросы, потребляющие наибольшее суммарное время (total_time = mean_time × calls)."
        how: "Сортировка по total_time показывает запросы с наибольшим влиянием на производительность базы в целом."
        nuances:
          - "Запрос может быть быстрым, но вызываться так часто, что суммарно занимает много времени."
          - "Оптимизация expensive queries даёт наибольший эффект для общей производительности системы."
          - "Рассмотрите: добавление индексов, переписывание запроса, кэширование результатов, материализованные представления."

      missing_index_queries:
        title: "Missing Index Queries"
        what: "Запросы, выполняющие sequential scan на больших таблицах вместо использования индексов."
        how: "Анализируется количество seq_scan и seq_tup_read для таблиц, затронутых запросами. Большое число прочитанных строк при seq_scan указывает на потенциальную необходимость индекса."
        nuances:
          - "Sequential scan НОРМАЛЕН для: маленьких таблиц, запросов возвращающих >5-10% данных, таблиц без подходящих колонок для индексации."
          - "Комплексный индекс (a, b, c) покрывает: WHERE a, WHERE a AND b, WHERE a AND b AND c, но НЕ покрывает WHERE b или WHERE c."
          - "EXPLAIN ANALYZE покажет реальный план выполнения запроса."
          - "Partial indexes (CREATE INDEX ... WHERE condition) экономят место и ускоряют специфичные запросы."

      low_cache_hit_queries:
        title: "Low Cache Hit Queries"
        what: "Запросы с низким процентом попадания в кэш (shared_buffers)."
        how: "Рассчитывается как shared_blks_hit / (shared_blks_hit + shared_blks_read). Низкий cache hit ratio означает частое чтение с диска."
        nuances:
          - "Целевой cache hit ratio: >95% для активных данных."
          - "Низкий cache hit может указывать на: недостаточный shared_buffers, слишком большие таблицы, неэффективные запросы сканирующие много данных."
          - "Увеличение shared_buffers помогает, но есть предел эффективности (обычно 25% RAM)."
          - "Covering indexes (INCLUDE) позволяют выполнять index-only scan без обращения к таблице."

      temp_file_queries:
        title: "Temp File Queries"
        what: "Запросы, сбрасывающие промежуточные результаты во временные файлы на диск."
        how: "Анализирует temp_blks_written и temp_blks_read из pg_stat_statements. Временные файлы создаются, когда work_mem недостаточен для сортировки, хеширования или материализации."
        nuances:
          - "Запись во временные файлы на порядки медленнее, чем операции в памяти."
          - "Увеличение work_mem может устранить временные файлы, но влияет на все сессии — используйте SET LOCAL для конкретных запросов."
          - "Частые причины: большие сортировки (ORDER BY), hash join на больших таблицах, DISTINCT на множестве строк, сложные CTE."
          - "Рассмотрите добавление индексов для устранения сортировок или переписывание запросов для уменьшения промежуточных результатов."

      all_queries:
        title: "All Queries"
        what: "Полная статистика по всем запросам из pg_stat_statements."
        how: "Отображает все отслеживаемые запросы с их метриками: calls, total_time, mean_time, rows и т.д."
        nuances:
          - "pg_stat_statements нормализует запросы, заменяя литералы на $1, $2 и т.д."
          - "Статистика сбрасывается при: перезапуске PostgreSQL, вызове pg_stat_statements_reset(), достижении лимита track_activity_query_size."
          - "Параметр pg_stat_statements.max контролирует максимальное число отслеживаемых запросов (по умолчанию 5000)."

      # === INDEXES ===
      unused_indexes:
        title: "Unused Indexes"
        what: "Индексы, которые редко или никогда не используются для сканирования."
        how: "Анализируется idx_scan из pg_stat_user_indexes. Индексы с нулевым или очень низким числом сканирований — кандидаты на удаление."
        nuances:
          - "Перед удалением убедитесь, что статистика собрана за достаточный период (включая все типы нагрузки: отчёты, batch-операции)."
          - "Индексы всё равно обновляются при INSERT/UPDATE/DELETE, даже если не используются для чтения — это overhead."
          - "Уникальные индексы (UNIQUE) могут иметь 0 сканирований, но нужны для constraint."
          - "Foreign key индексы важны для производительности DELETE/UPDATE родительских таблиц."

      duplicate_indexes:
        title: "Duplicate Indexes"
        what: "Индексы, которые дублируют другие индексы (один является префиксом другого)."
        how: "Сравниваются определения индексов. Индекс (a) избыточен при наличии (a, b). Также выявляются полные дубликаты."
        nuances:
          - "Дубликаты тратят дисковое пространство и замедляют INSERT/UPDATE/DELETE."
          - "Однако иногда 'дубликат' нужен: разные типы индексов (B-tree vs GIN), partial index vs full index."
          - "Индекс (a, b) НЕ полностью заменяет (b, a) — порядок колонок критичен."

      invalid_indexes:
        title: "Invalid Indexes"
        what: "Индексы, создание которых не завершилось успешно (invalid state)."
        how: "Проверяется флаг indisvalid в pg_index. False означает, что индекс не будет использоваться планировщиком."
        nuances:
          - "Обычно появляются после неудачного CREATE INDEX CONCURRENTLY."
          - "Решение: DROP INDEX и повторное создание."
          - "REINDEX CONCURRENTLY может помочь для существующих невалидных индексов (PostgreSQL 12+)."

      missing_indexes:
        title: "Missing Indexes"
        what: "Таблицы с высоким числом sequential scan, которым, вероятно, не хватает индексов."
        how: "Анализируется соотношение seq_scan vs idx_scan и количество прочитанных строк (seq_tup_read)."
        nuances:
          - "Не все seq_scan плохи — для маленьких таблиц это оптимально."
          - "Анализируйте конкретные запросы через pg_stat_statements, чтобы понять какие колонки индексировать."
          - "Используйте EXPLAIN ANALYZE для проверки, будет ли индекс использоваться."

      index_usage:
        title: "Index Usage"
        what: "Статистика использования индексов: сколько раз сканировались, сколько строк возвращали."
        how: "Данные из pg_stat_user_indexes показывают эффективность каждого индекса."
        nuances:
          - "idx_scan — количество index scan операций."
          - "idx_tup_read — строки прочитанные из индекса."
          - "idx_tup_fetch — строки извлечённые из таблицы после index scan (для non-covering indexes)."

      inefficient_indexes:
        title: "Inefficient Indexes"
        what: "Индексы, которые используются, но сканируют гораздо больше записей, чем реально извлекают."
        how: "Сравнивает idx_tup_read (записей прочитано из индекса) и idx_tup_fetch (строк извлечено из heap) из pg_stat_user_indexes. Высокое соотношение означает, что порядок колонок индекса не соответствует предикатам запроса, вынуждая PostgreSQL сканировать большие диапазоны индекса."
        nuances:
          - "Соотношение read/fetch >10 означает, что индекс читает в 10+ раз больше записей, чем возвращает — явный признак неправильного порядка колонок."
          - "Для составных индексов (a, b, c) запросы, фильтрующие по (b) или (c) без (a), не могут выполнить точный seek и вынуждены сканировать широкие диапазоны."
          - "Решение: создать целевой индекс с колонками, соответствующими наиболее селективным WHERE-предикатам в первую очередь."
          - "Используйте EXPLAIN ANALYZE для подтверждения, что index scan читает избыточное количество записей, прежде чем вносить изменения."
          - "Index-only scans (где idx_tup_fetch = 0) исключены — они указывают на эффективно работающие covering indexes."

      bloated_indexes:
        title: "Bloated Indexes"
        what: "Индексы с высоким уровнем bloat (раздувания) из-за мёртвых кортежей."
        how: "Оценивается отношение реального размера к ожидаемому. Bloat появляется после UPDATE/DELETE операций."
        nuances:
          - "REINDEX или REINDEX CONCURRENTLY пересоздаёт индекс без bloat."
          - "Регулярный VACUUM поддерживает bloat на приемлемом уровне."
          - "pg_repack позволяет перестроить индексы без блокировок."
          - "Bloat >30-50% — повод для действий."

      fk_without_indexes:
        title: "FK Without Indexes"
        what: "Внешние ключи на дочерних таблицах без поддерживающего индекса."
        how: "Сравнивает pg_constraint (внешние ключи) с pg_index для поиска FK-колонок без соответствующего ведущего индекса."
        nuances:
          - "Без индекса DELETE или UPDATE родительской таблицы вызывает sequential scan дочерней таблицы."
          - "На больших дочерних таблицах это может вызвать серьёзную конкуренцию блокировок и замедлить каскадные операции."
          - "Индекс должен иметь FK-колонку как ведущую (первую) для эффективности."
          - "Маленькие таблицы (< 10K строк) могут не выиграть от добавления индекса — PostgreSQL предпочтёт seq scan."

      index_correlation:
        title: "Index Correlation"
        what: "Индексы, где физический порядок строк плохо соответствует порядку индекса."
        how: "Читает pg_stats.correlation для ведущих колонок индексов. Корреляция около 0 означает случайный физический порядок относительно индекса, что вызывает избыточный random I/O при range scan."
        nuances:
          - "Корреляция от -1 до 1. Значения около 0 — случайный порядок; около 1 или -1 — упорядоченный."
          - "Низкая корреляция в основном влияет на range scan (BETWEEN, >, <) и ORDER BY — точечные поиски затронуты меньше."
          - "CLUSTER table USING index физически переупорядочивает строки, но блокирует таблицу и не поддерживается автоматически."
          - "Для append-only таблиц с timestamp колонками корреляция естественно высокая — действий не требуется."
          - "Показаны только таблицы > 10MB с > 100 index scan для снижения шума."

      index_sizes:
        title: "Index Sizes"
        what: "Размеры индексов на диске."
        how: "Показывает pg_relation_size для каждого индекса."
        nuances:
          - "Большие индексы требуют больше памяти для эффективного кэширования."
          - "Partial indexes могут значительно уменьшить размер: CREATE INDEX ... WHERE active = true."
          - "BRIN индексы намного компактнее B-tree для некоторых паттернов данных (например, timestamp колонки)."

      # === TABLES ===
      table_sizes:
        title: "Table Sizes"
        what: "Размеры таблиц на диске (данные + TOAST + индексы)."
        how: "Использует pg_total_relation_size для полного размера включая все связанные объекты."
        nuances:
          - "TOAST хранит большие значения (>2KB) в отдельной таблице."
          - "Партиционирование помогает управлять большими таблицами."
          - "Регулярный VACUUM FULL может уменьшить размер, но блокирует таблицу."

      bloated_tables:
        title: "Bloated Tables"
        what: "Таблицы с высоким процентом dead tuples (мёртвых строк)."
        how: "Анализируется n_dead_tup из pg_stat_user_tables. Dead tuples появляются после UPDATE/DELETE."
        nuances:
          - "VACUUM удаляет dead tuples и освобождает место для повторного использования."
          - "VACUUM FULL физически уменьшает размер файла, но блокирует таблицу."
          - "autovacuum должен справляться автоматически — проверьте его настройки если видите много bloat."
          - "Dead tuple ratio >20% — сигнал проблемы с vacuum."

      vacuum_needed:
        title: "Vacuum Needed"
        what: "Таблицы, которым требуется VACUUM на основе статистики dead tuples и времени последнего vacuum."
        how: "Комбинирует данные о dead tuples, последнем vacuum и размере таблицы."
        nuances:
          - "last_vacuum и last_autovacuum показывают когда последний раз запускался vacuum."
          - "Если autovacuum не справляется, можно: снизить autovacuum_vacuum_threshold, увеличить autovacuum_vacuum_scale_factor, добавить workers."
          - "Для критичных таблиц можно настроить индивидуальные параметры: ALTER TABLE SET (autovacuum_vacuum_threshold = 1000)."

      row_counts:
        title: "Row Counts"
        what: "Приблизительное количество строк в таблицах."
        how: "Использует n_live_tup из pg_stat_user_tables (обновляется ANALYZE) или reltuples из pg_class."
        nuances:
          - "Это приблизительная оценка, точный COUNT(*) может отличаться."
          - "ANALYZE обновляет статистику, autovacuum запускает его автоматически."
          - "Для точного подсчёта используйте SELECT COUNT(*), но это может быть медленно на больших таблицах."

      cache_hit_ratios:
        title: "Cache Hit Ratios"
        what: "Процент попадания в кэш (shared buffers) для каждой таблицы."
        how: "Рассчитывается как heap_blks_hit / (heap_blks_hit + heap_blks_read)."
        nuances:
          - "Целевое значение: >95% для активно используемых таблиц."
          - "Низкий cache hit: таблица слишком большая для кэша или редко используется."
          - "Решения: увеличить shared_buffers, оптимизировать запросы, добавить индексы для уменьшения сканируемых данных."

      seq_scans:
        title: "Sequential Scans"
        what: "Таблицы с высоким количеством sequential scan операций."
        how: "Данные из pg_stat_user_tables показывают seq_scan vs idx_scan."
        nuances:
          - "seq_scan не всегда плохо — для маленьких таблиц это оптимально."
          - "seq_tup_read показывает сколько строк прочитано — это важнее чем количество scan."
          - "Высокий seq_tup_read/seq_scan = много строк за один scan = возможно норма."
          - "Низкий seq_tup_read/seq_scan = много scan маленьких объёмов = возможно N+1."

      tables_without_pk:
        title: "Tables Without Primary Keys"
        what: "Таблицы без первичного ключа."
        how: "Проверяет pg_index на отсутствие indisprimary записей для пользовательских таблиц."
        nuances:
          - "Логическая репликация требует первичный ключ или REPLICA IDENTITY для идентификации строк."
          - "Без PK операции UPDATE и DELETE требуют иного способа уникальной идентификации строк, часто приводя к полным сканам таблицы."
          - "Join-таблицы (many-to-many) часто намеренно без PK — рассмотрите добавление составного PK."
          - "Некоторые ORM (например, Rails) предполагают наличие 'id' первичного ключа — таблицы без него могут вызвать ошибки фреймворка."

      recently_modified:
        title: "Recently Modified"
        what: "Таблицы с недавней активностью INSERT/UPDATE/DELETE."
        how: "Анализируются n_tup_ins, n_tup_upd, n_tup_del из pg_stat_user_tables."
        nuances:
          - "Помогает понять паттерны записи в базу."
          - "Высокая активность UPDATE создаёт dead tuples — следите за vacuum."
          - "HOT updates (Heap Only Tuple) эффективнее обычных — индексы не обновляются."

      update_hotspots:
        title: "Горячие точки UPDATE"
        what: "Таблицы, где одни и те же строки обновляются многократно, либо где индексированные колонки получают hot-update."
        how: "Считает два соотношения из pg_stat_user_tables: updates_per_row = n_tup_upd / n_live_tup (амплификация записи на строку) и hot_update_pct = n_tup_hot_upd / n_tup_upd (низкое значение = индексированная колонка попадает в SET, что ломает HOT)."
        nuances:
          - "updates_per_row >> 1 означает, что отдельные строки переписываются многократно — типично для счётчиков, статусов, last_seen_at, позиций."
          - "Паттерны рефакторинга для горячих строк: вынести изменчивую колонку в соседнюю 1:1 'state'-таблицу; перейти на event/log-таблицу с периодическими свёртками; буферизировать записи в фоне; debounce на стороне приложения."
          - "Низкий hot_update_pct (например, <50%) = обновляется индексированная колонка. Либо удалите индекс, либо вынесите колонку в менее индексированную таблицу."
          - "PostgreSQL не считает UPDATE по колонкам. Чтобы найти виновную колонку, парсите pg_stat_statements: имена колонок в SET сохраняются (нормализуются только литералы)."
          - "Горячие строки + fillfactor по умолчанию (100) убивают HOT. ALTER TABLE ... SET (fillfactor=80) оставляет место для in-place UPDATE."
          - "Высокий n_dead_tup коррелирует с горячими строками — autovacuum должен успевать, иначе bloat будет расти быстро."

      unused_tables:
        title: "Неиспользуемые таблицы"
        what: "Таблицы с нулём seq_scan и нулём idx_scan с момента последнего сброса статистики — код их не читает."
        how: "Фильтрует pg_stat_user_tables по seq_scan = 0 AND idx_scan = 0. Показывает db_stats_since (pg_stat_database.stats_reset), чтобы было понятно, на каком окне сделан вывод."
        nuances:
          - "Убедитесь, что db_stats_since покрывает репрезентативный период — минимум неделя, лучше полный отчётный/биллинговый цикл. Недавний stats_reset, рестарт или обновление PG обнуляют выводы."
          - "Таблицы, читаемые только репликами, НЕ считаются на праймари. Проверьте реплики отдельно перед удалением."
          - "Таблицы, к которым обращаются только COPY, pg_dump или logical replication, могут выглядеть unused — эти операции не инкрементят счётчики сканов."
          - "FK на эту таблицу могут держать её 'в работе' через каскады без прямых запросов."
          - "Безопасная последовательность: переименовать → подождать полный цикл → удалить. Или переместить в отдельную archive-схему."

      # === CONNECTIONS ===
      active_connections:
        title: "Active Connections"
        what: "Текущие подключения к базе данных."
        how: "Данные из pg_stat_activity показывают все активные backend процессы."
        nuances:
          - "Каждое подключение потребляет память (~10MB per connection)."
          - "max_connections ограничивает общее число — не устанавливайте слишком высоко."
          - "Используйте connection pooler (PgBouncer, pgpool-II) для масштабирования."
          - "state: active = выполняет запрос, idle = ждёт, idle in transaction = опасно."

      connection_stats:
        title: "Connection Stats"
        what: "Статистика подключений сгруппированная по состоянию (state)."
        how: "Агрегация pg_stat_activity по полю state."
        nuances:
          - "idle in transaction: транзакция открыта но не активна — блокирует VACUUM, удерживает локи."
          - "idle in transaction (aborted): ошибка в транзакции, ждёт ROLLBACK."
          - "Настройте idle_in_transaction_session_timeout для автоматического завершения."

      long_running_queries:
        title: "Long Running Queries"
        what: "Запросы, выполняющиеся дольше заданного порога."
        how: "Фильтрация pg_stat_activity по duration = now() - query_start."
        nuances:
          - "Долгие запросы могут держать блокировки и мешать другим процессам."
          - "statement_timeout может автоматически прерывать слишком долгие запросы."
          - "Для отчётов/аналитики используйте read replica или настройте отдельный connection pool."

      blocking_queries:
        title: "Blocking Queries"
        what: "Запросы, которые блокируют выполнение других запросов."
        how: "Анализ pg_locks для поиска цепочек блокировок."
        nuances:
          - "Блокировки — нормальная часть работы, но долгие блокировки проблематичны."
          - "Частые причины: длинные транзакции, отсутствующие индексы при UPDATE/DELETE по FK."
          - "pg_cancel_backend(pid) отменяет запрос, pg_terminate_backend(pid) завершает соединение."
          - "Рассмотрите оптимистичную блокировку на уровне приложения."

      locks:
        title: "Locks"
        what: "Текущие блокировки в базе данных."
        how: "Данные из pg_locks показывают все активные блокировки всех типов."
        nuances:
          - "Типы: AccessShare (SELECT), RowShare (SELECT FOR UPDATE), RowExclusive (INSERT/UPDATE/DELETE), AccessExclusive (ALTER TABLE, DROP)."
          - "granted = false означает, что запрос ждёт блокировку."
          - "deadlock_timeout контролирует через сколько PostgreSQL проверит на deadlock."

      idle_connections:
        title: "Idle Connections"
        what: "Подключения в состоянии idle (не выполняют запросы)."
        how: "Фильтрация pg_stat_activity по state = 'idle'."
        nuances:
          - "Умеренное количество idle соединений — норма для connection pooling."
          - "Слишком много idle = приложение не закрывает соединения или пул слишком большой."
          - "idle_session_timeout (PostgreSQL 14+) может автоматически закрывать idle соединения."

      pool_usage:
        title: "Использование пула соединений"
        what: "Текущее использование пула соединений с показателями активных, idle и доступных соединений по базам данных."
        how: "Анализ состояний соединений в pg_stat_activity и сравнение с лимитом max_connections."
        nuances:
          - "Утилизация выше 70% означает приближение к лимиту — рассмотрите масштабирование."
          - "Idle in transaction соединения расходуют ресурсы и блокируют VACUUM."
          - "max_connections — глобальная настройка для всей БД, а не для каждой базы отдельно."
          - "Connection pooler'ы (PgBouncer/pgpool) позволяют иметь больше соединений на уровне приложения."

      pool_wait_times:
        title: "Анализ времени ожидания"
        what: "Запросы, ожидающие ресурсов (блокировки, I/O, сеть)."
        how: "Анализ wait_event и wait_event_type из pg_stat_activity для не-idle соединений."
        nuances:
          - "ClientRead ожидания = медленный клиент не успевает потреблять данные."
          - "Lock ожидания = конкуренция между конкурентными запросами."
          - "IO ожидания = проблемы производительности диска или недостаточный кэш."
          - "Ожидания более 60 секунд критичны и требуют немедленного расследования."

      pool_saturation:
        title: "Предупреждения о насыщении пула"
        what: "Общие метрики здоровья пула соединений с предупреждениями о насыщении и рекомендациями."
        how: "Расчет процентов утилизации для total, active, idle и проблемных соединений."
        nuances:
          - "Постоянная утилизация выше 70% = необходимость настройки пула или масштабирования."
          - "Высокое количество idle in transaction = проблемы обработки транзакций приложением."
          - "superuser_reserved_connections уменьшают доступную емкость пула."
          - "Отслеживайте тренды — резкие скачки могут указывать на утечки соединений."

      connection_churn:
        title: "Анализ оборачиваемости соединений"
        what: "Анализ паттернов жизненного цикла соединений для выявления избыточного churn (частое подключение/отключение)."
        how: "Изучение возраста соединений для идентификации короткоживущих соединений и расчета churn rate по приложениям."
        nuances:
          - "Соединения младше 10 секунд = короткоживущие."
          - "Churn rate выше 50% = отсутствие или неправильная настройка connection pooling."
          - "Много коротких соединений = увеличенная нагрузка на CPU и аутентификацию."
          - "Веб-приложения должны поддерживать пул соединений, а не создавать соединения на каждый запрос."

      # === SYSTEM ===
      database_sizes:
        title: "Database Sizes"
        what: "Размеры всех баз данных на сервере."
        how: "Использует pg_database_size() для каждой базы."
        nuances:
          - "Размер включает все таблицы, индексы, TOAST и временные объекты."
          - "Физическое удаление данных не сразу уменьшает размер — нужен VACUUM FULL."
          - "Мониторьте рост для планирования дискового пространства."

      settings:
        title: "PostgreSQL Settings"
        what: "Текущие настройки конфигурации PostgreSQL."
        how: "Чтение pg_settings показывает runtime конфигурацию."
        nuances:
          - "Некоторые параметры требуют перезапуска (context = 'postmaster')."
          - "Проверяйте source — откуда взято значение (default, configuration file, override)."
          - "Используйте ALTER SYSTEM для постоянных изменений."

      extensions:
        title: "Extensions"
        what: "Установленные расширения PostgreSQL."
        how: "Список из pg_extension."
        nuances:
          - "pg_stat_statements — must have для мониторинга производительности."
          - "pg_trgm — для LIKE '%pattern%' запросов."
          - "btree_gin/btree_gist — для комбинированных GIN/GiST индексов."
          - "Проверяйте совместимость версий при обновлении PostgreSQL."

      activity_overview:
        title: "Activity Overview"
        what: "Общая сводка текущей активности базы данных."
        how: "Агрегация pg_stat_activity: активные/idle/waiting запросы, транзакции."
        nuances:
          - "Полезно для быстрой оценки состояния базы."
          - "Сравнивайте с baseline для выявления аномалий."

      wraparound_risk:
        title: "Wraparound Risk"
        what: "Близость возраста Transaction ID к лимиту wraparound в 2 миллиарда."
        how: "Читает age(datfrozenxid) из pg_database. Когда значение приближается к 2^31 (~2.1 млрд), PostgreSQL остановится для предотвращения повреждения данных."
        nuances:
          - "autovacuum_freeze_max_age (по умолчанию 200M) автоматически запускает агрессивный anti-wraparound VACUUM."
          - "Если age превышает freeze_max_age, anti-wraparound VACUUM уже должен работать — если нет, расследуйте причину."
          - "Долгоживущие транзакции не дают VACUUM продвинуть frozen XID — мониторьте idle-in-transaction."
          - "В экстренных случаях запустите VACUUM FREEZE на самых больших/старых таблицах первыми."
          - "Pct > 50% — предупреждение; > 75% — критично, требует немедленных действий."

      checkpoint_stats:
        title: "Checkpoint Stats"
        what: "Частота чекпоинтов и метрики производительности background writer."
        how: "Данные из pg_stat_bgwriter показывают количество чекпоинтов, тайминги и распределение записи буферов."
        nuances:
          - "checkpoints_timed = запланированные чекпоинты (нормально); checkpoints_req = вынужденные чекпоинты (под нагрузкой)."
          - "Высокий requested_pct означает, что WAL заполняется до checkpoint_timeout — увеличьте max_wal_size."
          - "buffers_backend > 0 означает, что бэкенды сами пишут грязные буферы — увеличьте shared_buffers или активность bgwriter."
          - "bgwriter_stops (maxwritten_clean) > 0 означает, что bgwriter достиг лимита за раунд — увеличьте bgwriter_lru_maxpages."
          - "Статистика накапливается с момента stats_reset — сравнивайте за периоды для осмысленного анализа."

      cache_stats:
        title: "Cache Stats"
        what: "Статистика кэширования базы данных."
        how: "Данные из pg_stat_database показывают blks_read vs blks_hit."
        nuances:
          - "Cache hit ratio = blks_hit / (blks_hit + blks_read)."
          - "Целевое значение: >99% для OLTP, >95% для mixed workload."
          - "Низкий cache hit: увеличьте shared_buffers (до 25% RAM), или проблема в запросах."

      # === SCHEMA ANALYSIS ===
      unused_columns:
        title: "Неиспользуемые колонки"
        what: "Колонки, которые когда-либо хранили только одно уникальное значение — сильный признак, что приложение их больше не обновляет."
        how: "Читает pg_stats.n_distinct = 1 (одно значение по выборке) и джойнит pg_attrdef для отображения default. Исключает первичные ключи и колонки уникальных индексов, чтобы убрать шум."
        nuances:
          - "n_distinct — оценка по выборке. Сделайте ANALYZE перед тем, как доверять результату. Устаревшая статистика даёт ложные срабатывания."
          - "Таблицы меньше ~1000 строк исключены — на маленькой выборке одно значение статистически бессмысленно."
          - "Ложные срабатывания: feature flags, enum-колонки с одним released-значением, колонки с дефолтом и одним валидным вариантом."
          - "Истинные находки: колонки, у которых удалили Ruby/ORM-аксессор, но миграцию на drop column не написали; статусы, заменённые другим механизмом, но оставленные в схеме."
          - "PostgreSQL не отслеживает запись по колонкам, это эвристика. Перед удалением grep'ните кодовую базу по имени колонки."
          - "Смотрите также `always_null_columns` — тот же диагноз с другого ракурса."

      always_null_columns:
        title: "Колонки, всегда NULL"
        what: "Nullable-колонки, где 100% строк = NULL — приложение перестало (или никогда не начинало) их писать."
        how: "Читает pg_stats.null_frac >= 0.999 (фактически все NULL) и исключает колонки с NOT NULL. Джойнит pg_attrdef, чтобы показать оставшийся default."
        nuances:
          - "null_frac — оценка по выборке. Сделайте ANALYZE, если сомневаетесь. Перепроверьте после репрезентативного окна нагрузки."
          - "Колонка может быть NULL, потому что путь записи редко срабатывает (premium-only поля, opt-in фичи). Проверяйте перед удалением."
          - "Если null_pct = 100 И есть не-NULL default — default не используется, удаляйте вместе с колонкой."
          - "Некоторые ORM сериализуют пустые строки как '' вместо NULL; этот отчёт их не поймает. Если нужен такой сигнал — отдельный отчёт."
          - "Сравните с `unused_columns` — он ловит колонки с одним значением, этот — все-NULL. Вместе покрывают основные паттерны мёртвых колонок."

      polymorphic_without_index:
        title: "Polymorphic без индекса"
        what: "Полиморфные `belongs_to`-ассоциации, у которых пара `(*_type, *_id)` не покрыта составным индексом."
        how: "Обходит `ActiveRecord::Base.descendants`, собирает `belongs_to`-рефлексии с `polymorphic: true` и проверяет `pg_index` на наличие индекса, покрывающего обе колонки."
        nuances:
          - "PostgreSQL не сможет использовать два одиночных индекса так же эффективно, как один составной для `WHERE x_type = ? AND x_id = ?` — это базовый паттерн загрузки полиморфной ассоциации."
          - "Подсказка `coverage` уточняет пробел: \"neither indexed\" / \"only id indexed\" / \"only type indexed\" / \"type and id indexed separately\". Последние два — частичные решения, не полные."
          - "На маленьких таблицах безвредно; на больших (Comment, Note, Activity, AuditLog) каждый запрос к ассоциации превращается в seq scan."
          - "Предлагаемая миграция использует порядок `(type, id)` — у type обычно ниже cardinality, индекс сужается быстрее."
          - "Перед обходом моделей выполняется `eager_load!`, чтобы в dev результат был полным."

      counter_cache_issues:
        title: "Проблемы counter_cache"
        what: "`belongs_to ..., counter_cache: ...` декларации, у которых целевая колонка отсутствует в родительской таблице."
        how: "Обходит все модели, находит `belongs_to` с опцией `counter_cache`, разрешает имя ожидаемой колонки (`<child_table>_count` для `counter_cache: true` или явный символ/строка) и проверяет колонки родителя."
        nuances:
          - "Отсутствующая колонка = counter молча сломан: записи никуда не идут, `parent.<assoc>_count` возвращает nil, любой код, читающий cached-значение, получает stale или ноль."
          - "Обратное направление (колонка `*_count` без декларации `counter_cache`) намеренно не флагается — слишком много false positives для вручную поддерживаемых счётчиков."
          - "Родительский класс резолвится через `assoc.klass`; если класс отсутствует или не загружается — строка пропускается."
          - "Имя по умолчанию для `counter_cache: true`: на родителя добавляется колонка с именем по таблице **дочерней** модели в множественном числе + `_count`. Пример: `Comment belongs_to :user, counter_cache: true` → `users.comments_count`."
          - "Перед обходом моделей выполняется `eager_load!`, чтобы в dev результат был полным."

      soft_delete_without_scope:
        title: "Soft delete без scope"
        what: "Таблицы с колонкой `deleted_at` / `discarded_at` / `archived_at`, у модели которых нет scope, фильтрующего soft-deleted строки."
        how: "Для каждой таблицы проверяется наличие канонических имён soft-delete колонок. Если есть — находится модель и проверяется `acts_as_paranoid` (paranoia), `discard_column` (discard) или `default_scope`, чей сгенерированный SQL ссылается на колонку."
        nuances:
          - "Без default scope любой обычный `Model.where(...)` возвращает soft-deleted строки. Это тихо протекает в отчёты, индексы, поиск, экспорты."
          - "Если команда сознательно отказалась от default scope (предпочитая явные `kept`/`with_deleted`), отчёт даст по строке на каждую такую модель — это intentional, можно игнорировать."
          - "Метод детекции default_scope: строит `model.all.to_sql` и ищет имя колонки. Ловит `default_scope { where(deleted_at: nil) }` и эквиваленты, но пропускает scope из concerns, которые ещё не загружены."
          - "Таблицы без модели рапортуются отдельно со статусом `no_model` — обычно значит, что таблица используется только raw SQL и требует ручного ревью."
          - "Перед обходом моделей выполняется `eager_load!`, чтобы в dev результат был полным."

      orphan_tables:
        title: "Orphan-таблицы"
        what: "Таблицы БД без соответствующего Rails-класса модели."
        how: "Перечисляет все таблицы из `pg_class` (за исключением `schema_migrations` и `ar_internal_metadata`) и пытается найти модель по обычным naming conventions. Таблицы, не находящие модель, попадают в отчёт."
        nuances:
          - "Три классификации: `join_table_candidate` (ровно две `*_id` колонки и больше ничего — вероятно, легитимная HABTM-таблица), `join_model_without_class` (несколько FK + дополнительные поля — вероятно, должна была быть моделью join'а), `legacy` (всё остальное)."
          - "`join_table_candidate` обычно intentional — Rails не требует модель для HABTM. Просмотреть и игнорировать."
          - "`legacy` — самые интересные строки: таблицы, созданные до того, как добавили модель; переименованные-но-не-удалённые; созданные мимо Rails другим сервисом; принадлежащие удалённой фиче."
          - "Сверьте с `unused_tables` (категория Таблицы) — таблица одновременно orphan И с нулём чтений = сильный кандидат на удаление."
          - "False positives: namespaced-модели (`Admin::User` → `admin_users`), STI-подклассы на одной базовой таблице, модели в engines, которые не eager-loadятся."
          - "Row count приблизительный (n_live_tup из pg_stat_user_tables) — недавно записанные таблицы могут показывать 0 до следующего ANALYZE."

      missing_validations:
        title: "Отсутствующие валидации"
        what: "Уникальные индексы в базе данных без соответствующих валидаций uniqueness в Rails-моделях."
        how: "Анализирует все уникальные индексы (включая композитные) и проверяет наличие validates :column, uniqueness: true в соответствующей Rails-модели."
        nuances:
          - "Ограничения БД (индексы) и валидации модели служат разным целям — оба должны присутствовать."
          - "Уникальный индекс предотвращает дубликаты на уровне БД, валидация даёт понятные сообщения об ошибках."
          - "Для композитных индексов (a, b) нужна валидация со scope: validates :a, uniqueness: { scope: :b }"
          - "Некоторые таблицы могут не иметь моделей — это нормально для join-таблиц или legacy-таблиц."
          - "Валидации в concerns и родительских моделях также детектируются."
          - "Первичные ключи не требуют валидаций — они автоматически уникальны."

    # Problem explanations for highlighting
    problems:
      high_mean_time: "Высокое среднее время выполнения. Рассмотрите добавление индексов или оптимизацию запроса."
      high_calls: "Очень частые вызовы. Рассмотрите кэширование или batch-операции."
      high_total_time: "Запрос потребляет много общего времени. Приоритет для оптимизации."
      low_cache_hit: "Низкий cache hit ratio. Запрос часто читает с диска вместо кэша."
