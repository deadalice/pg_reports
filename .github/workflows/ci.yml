name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby }} / ${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Curated Ruby x Rails pairs covering the supported range
        # (gemspec: Ruby >= 2.7, Rails >= 5.0). Each Rails version has a
        # matching Gemfile in gemfiles/; Ruby 3.4 runs the root Gemfile and
        # owns coverage. Ruby 4.0 is pinned to Rails 8.1 to add forward
        # coverage of the newest Ruby without a duplicate coverage artifact.
        include:
          - { ruby: "2.7", rails: "6.1", name: "Rails 6.1", gemfile: "gemfiles/rails_6.1.gemfile" }
          - { ruby: "3.0", rails: "7.0", name: "Rails 7.0", gemfile: "gemfiles/rails_7.0.gemfile" }
          - { ruby: "3.1", rails: "7.1", name: "Rails 7.1", gemfile: "gemfiles/rails_7.1.gemfile" }
          - { ruby: "3.2", rails: "7.2", name: "Rails 7.2", gemfile: "gemfiles/rails_7.2.gemfile" }
          - { ruby: "3.3", rails: "8.0", name: "Rails 8.0", gemfile: "gemfiles/rails_8.0.gemfile" }
          - { ruby: "3.4", rails: "edge", name: "Rails (root)", gemfile: "Gemfile" }
          - { ruby: "4.0", rails: "8.1", name: "Rails 8.1", gemfile: "gemfiles/rails_8.1.gemfile" }
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
      # Enforce the coverage floor only on the primary (root Gemfile) job;
      # older Rails versions exercise slightly different, version-gated paths.
      COVERAGE_NO_MIN: ${{ matrix.gemfile != 'Gemfile' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec
      - name: Upload coverage report
        if: matrix.gemfile == 'Gemfile'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  lint:
    name: Lint (Standard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run standardrb
        run: bundle exec standardrb

  security:
    name: Security (Brakeman + bundler-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Brakeman (static analysis)
        run: bundle exec brakeman --no-pager --quiet --ignore-config config/brakeman.ignore --exit-on-warn
      - name: bundler-audit (dependency CVEs)
        run: bundle exec bundler-audit check --update
